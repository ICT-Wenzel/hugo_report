services:

##Frontend##
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    restart: always
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./app:/app

volumes:
  app: